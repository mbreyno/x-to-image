[build]
  command = "npm run build"
  publish = "dist"

# Proxy /twitter-api/* to the serverless function (production CORS fix)
[[redirects]]
  from = "/twitter-api/*"
  to = "/.netlify/functions/twitter-proxy/:splat"
  status = 200
  force = true

# Stock photo proxy (server-side Picsum fetch → base64 data URL, no browser CORS)
[[redirects]]
  from = "/photo-api"
  to = "/.netlify/functions/photo-proxy"
  status = 200
  force = true

# Image upload proxy (base64 → imgbb → public URL for Buffer attachment)
[[redirects]]
  from = "/upload-api"
  to = "/.netlify/functions/image-upload"
  status = 200
  force = true

# Instagram Graph API publish (image → imgbb → Instagram media container → publish)
[[redirects]]
  from = "/instagram-api"
  to = "/.netlify/functions/instagram-publish"
  status = 200
  force = true

# SPA fallback — must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
