<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f111a"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9ce34"/>
      <stop offset="40%" stop-color="#ee2a7b"/>
      <stop offset="100%" stop-color="#6228d7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="680" y="100" width="420" height="430" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow orbs -->
  <ellipse cx="200" cy="315" rx="280" ry="200" fill="#3b82f6" opacity="0.06"/>
  <ellipse cx="1000" cy="315" rx="280" ry="200" fill="#8b5cf6" opacity="0.06"/>

  <!-- ── LEFT: X logo ── -->
  <g transform="translate(120, 215)">
    <!-- Circle backdrop -->
    <circle cx="100" cy="100" r="86" fill="#111827" stroke="#1f2937" stroke-width="1.5"/>
    <!-- X logo path -->
    <path d="M131.6 57.5h19.4l-42.4 48.5 49.9 66H133l-27.7-36.6-31.7 36.6H57.2l45.4-52.4L55.4 57.5H92l25.1 33.2zm-6.8 102.8h10.7L75.8 68.5H64.3z"
          fill="white" opacity="0.92"/>
  </g>

  <!-- ── ARROW ── -->
  <g transform="translate(330, 290)" opacity="0.7">
    <line x1="0" y1="25" x2="90" y2="25" stroke="#4b5563" stroke-width="2.5" stroke-dasharray="6 4"/>
    <path d="M82 15 L100 25 L82 35" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Sparkles -->
    <text x="28" y="-4" font-size="16" text-anchor="middle" opacity="0.6">✦</text>
    <text x="62" y="60" font-size="12" text-anchor="middle" opacity="0.4">✦</text>
  </g>

  <!-- ── RIGHT: Styled card mockup ── -->
  <g filter="url(#shadow)">
    <!-- Card outer frame (gradient background) -->
    <rect x="475" y="90" width="420" height="430" rx="24" fill="url(#cardBg)"/>
    <!-- Inner overlay shimmer -->
    <rect x="475" y="90" width="420" height="430" rx="24"
          fill="url(#dots)" opacity="0.3"/>
    <!-- Inner card (tweet card) -->
    <rect x="510" y="135" width="350" height="340" rx="16"
          fill="#000000" stroke="#2f3336" stroke-width="1"/>

    <!-- Avatar circle -->
    <circle cx="547" cy="187" r="22" fill="url(#cardBg)"/>
    <text x="547" y="193" font-size="18" text-anchor="middle" fill="white" font-weight="700">M</text>

    <!-- Name + handle -->
    <text x="580" y="182" font-size="13" font-weight="700" fill="#e7e9ea" font-family="system-ui, -apple-system, sans-serif">Michael Reynolds</text>
    <!-- Verified check -->
    <circle cx="755" cy="178" r="7" fill="#1d9bf0"/>
    <path d="M751 178 l3 3 6-6" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="580" y="198" font-size="11" fill="#71767b" font-family="system-ui, -apple-system, sans-serif">@mreynolds</text>

    <!-- X logo top-right of card -->
    <path d="M837.4 170h5.4l-11.8 13.5 13.9 18.4h-6.1l-7.7-10.2-8.8 10.2h-5.4l12.7-14.6-13.4-17.3h6.3l7 9.2zm-1.9 28.7h3l-19.6-25.8h-3.2z"
          fill="#e7e9ea" opacity="0.85" transform="scale(0.9) translate(47, 3)"/>

    <!-- Post text lines -->
    <rect x="540" y="218" width="290" height="10" rx="5" fill="#e7e9ea" opacity="0.9"/>
    <rect x="540" y="234" width="270" height="10" rx="5" fill="#e7e9ea" opacity="0.75"/>
    <rect x="540" y="250" width="240" height="10" rx="5" fill="#e7e9ea" opacity="0.6"/>
    <rect x="540" y="266" width="180" height="10" rx="5" fill="#e7e9ea" opacity="0.4"/>

    <!-- Divider -->
    <line x1="540" y1="300" x2="840" y2="300" stroke="#2f3336" stroke-width="1"/>

    <!-- Footer date + via X -->
    <text x="540" y="320" font-size="10" fill="#71767b" font-family="system-ui, -apple-system, sans-serif">Mar 19, 2025</text>
    <text x="820" y="320" font-size="10" fill="#71767b" text-anchor="end" font-family="system-ui, -apple-system, sans-serif">via X</text>
  </g>

  <!-- ── BOTTOM TEXT ── -->
  <!-- App name -->
  <text x="120" y="500" font-size="58" font-weight="800" letter-spacing="-2"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        fill="url(#titleGrad)">X to Image</text>

  <!-- Tagline -->
  <text x="122" y="548" font-size="22" fill="#6b7280"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        letter-spacing="-0.3">Turn X posts into beautiful shareable images</text>

</svg>
