<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>X to Image — Turn X Posts into Beautiful Shareable Images</title>
    <meta name="description" content="Paste any X (Twitter) post URL and instantly generate a stunning, shareable image card — perfect for Instagram, LinkedIn, and beyond. Choose gradients, photos, themes, and export at full resolution." />
    <meta name="author" content="X to Image" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, Slack, etc.) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://x-to-image.netlify.app/" />
    <meta property="og:title"       content="X to Image — Turn X Posts into Beautiful Shareable Images" />
    <meta property="og:description" content="Paste any X (Twitter) post URL and instantly generate a stunning image card — custom gradients, photo backgrounds, and Instagram-native resolutions." />
    <meta property="og:image"       content="https://x-to-image.netlify.app/og-image.svg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="X to Image app preview showing an X post being converted into a styled image card" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="X to Image — Turn X Posts into Beautiful Shareable Images" />
    <meta name="twitter:description" content="Paste any X post URL and instantly generate a stunning image card — custom gradients, photo backgrounds, and Instagram-native resolutions." />
    <meta name="twitter:image"       content="https://x-to-image.netlify.app/og-image.svg" />
    <meta name="twitter:image:alt"   content="X to Image app preview" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
